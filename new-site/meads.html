      <h1>meads</h1>
      <p>There have been <span id="numMeads"></span> meads logged overall.</p>
    </hgroup>
  </header>
  <main>
    <div id="meadsBreakdown">
    </div>
  </main>
  <footer>
  </footer>
  <script>
    fetch("./assets/data/meads.csv")
      .then(function (response) {
        return response.text().then((text) => parseAndJsonify(text));
      })
      .then(function (data) {
        document.getElementById("numMeads").innerHTML = data.length.toLocaleString();
        displayMeadsByMeadery(data);
      })
      .catch(function (err) {
        console.log(err);
      });

    function parseAndJsonify(csvText) {
      let expectedColumns = ["meadery", "mead", "flavors__tasting_notes"];
      let csvData = csvText.trim().split("\n");
      let actualColumns = csvData[0].trim().split(",");
      if (actualColumns.length !== expectedColumns.length && !actualColumns.every((val, i) => val === expectedColumns[i])) {
        throw new Error(`expected columns ${expectedColumns}; received ${actualColumns}`);
      }
      let jsonItems = new Array();
      for (let i = 1; i < csvData.length; ++i) {
        let fields = csvData[i].split(",");
        jsonItems.push({
          "meadery": fields[0].trim(),
          "mead": fields[1].trim(),
          "flavors": fields[2].trim(),
        });
      }
      return jsonItems;
    }

    function displayMeadsByMeadery(meads) {
      let meadsBreakdownDiv = document.getElementById("meadsBreakdown");
      let meaderys = new Set(meads.map((mead) => mead.meadery));
      meaderys.forEach((meadery) => {
        let meadsForMeadery = meads.filter((mead) => mead.meadery === meadery);

        let meaderyDetails = document.createElement("details");
        let meaderySummary= document.createElement("summary");
        meaderySummary.innerHTML = meadsForMeadery.length == 1
          ? `${meadery}&nbsp;&nbsp;&nbsp;<small>1 mead enjoyed</small>`
          : `${meadery}&nbsp;&nbsp;&nbsp;<small>${meadsForMeadery.length} meads enjoyed</small>`
        meaderyDetails.appendChild(meaderySummary);

        let meadsList = document.createElement("ul");
        meadsForMeadery.forEach((mead) => {
          let meadListItem = document.createElement("li");
          meadListItem.innerHTML = `${mead.mead}&nbsp;&nbsp;<small>'${mead.flavors.replace(/\"/g, "")}'</small>`;
          meadsList.appendChild(meadListItem);
        });
        meaderyDetails.appendChild(meadsList);

        meadsBreakdownDiv.appendChild(meaderyDetails);
      });
    }
  </script>
