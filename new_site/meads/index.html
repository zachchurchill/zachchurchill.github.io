<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>meads | zach churchill</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico" />
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/main.js" defer></script>
  </head>
  <body>
    <section id="summary">
      <!-- TODO add fun count-up animation using JS -->
      <p>There have been <strong id="noMeads">0</strong> meads logged overall.</p>
      <div>
        <button id="downloadData" type="button" onclick="window.open('./meads.json')">Download meads</button>
      </div>
    </section>

    <section id="meadsByMeadery">
    </section>
    <script defer>
      fetch("./meads.json")
        .then(res => res.json())
        .then(meads => {
          document.getElementById("noMeads").innerText = meads.length;
          listMeadsByMeadery({ meads: meads });
        })
        .catch(err => {
          console.error("Error loading meads.json", err);
          document.getElementById("noMeads").innerText = "-";
        })
    </script>
  </body>
</html>
