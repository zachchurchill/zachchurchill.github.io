<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>books | zach churchill</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico" />
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/main.js" defer></script>
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a id="back-home" href="../index.html">~</a></li>
          <li><a id="back-one" href="../index.html" onclick="goBack()">..</a></li>
        </ul>
      </nav>
    </header>

    <section id="summary">
      <!-- TODO add fun count-up animation using JS -->
      <p>There have been <strong id="noBooks">0</strong> books logged overall.</p>
      <div>
        <button id="downloadData" type="button" onclick="window.open('./books.json')">Download books</button>
      </div>
    </section>

    <section id="booksByYear">
    </section>

    <footer>
      <button id="back-to-top" onclick="scrollToTop()">&uarr; <span>back to top</span></button>
    </footer>

    <script defer>
      fetch("./books.json")
        .then(res => res.json())
        .then(books => {
          document.getElementById("noBooks").innerText = books.length;
          listBooksByYear({ books: books, year: 2025 });
          listBooksByYear({ books: books, year: 2024 });
          listBooksByYear({ books: books, year: 2023 });
        })
        .catch(err => {
          console.error("Error loading books.json", err);
          document.getElementById("noBooks").innerText = "-";
        })
    </script>
  </body>
</html>
