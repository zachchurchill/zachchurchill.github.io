<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>zach churchill</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/main.js" defer></script>
  </head>
  <body>
    <header>
      <nav><a href="../index.html">..</a></nav>
    </header>

    <section>
      <h1>posts</h1>
      <p>Enjoy the various thoughts, musings, and journal entries.</p>
    </section>

    <section>
      <!-- NOTE generating these dynamically may affect SEO -->
      <ul id="posts"></ul>
    </section>

    <script defer>
      fetch("posts.json")
        .then(res => res.json())
        .then(posts => {
          listPosts({
            posts: posts,
          });
        })
        .catch(err => {
          console.error("Error loading posts", err);
        });
    </script>
  </body>
</html>
