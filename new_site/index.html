    <script defer>
      fetch("blog/posts.json")
        .then(res => res.json())
        .then(posts => {
          listPosts({
            posts: posts,
            pathPrefix: "blog/",
            topN: 5
          });
        })
        .catch(err => {
          console.error("Error loading and listing posts", err);
        });
