<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>zach churchill</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/main.js" defer></script>
  </head>
  <body id="homepage">
    <div class="container">
      <header>
        <h1>zach churchill</h1>
        <p>simple website to keep track of the silly things & write some thoughts</p>
      </header>

      <main>
        <section>
          <h2>info</h2>
          <ul>
            <li><a href="https://github.com/zachchurchill">github repo</a></li>
            <li><a href="mailto:contact@zachurchill.com">email</a></li>
            <li><a href="https://www.linkedin.com/in/zach-churchill-9a8ab6318">resume</a></li>
          </ul>
        </section>

        <section>
          <h2>collections</h2>
          <ul>
            <li><a href="https://churchill-library.com">library</a></li>
            <li><a href="books/">books</a></li>
            <li><a href="meads/">meads</a></li>
            <li><a href="ferments/">ferments</a></li>
          </ul>
        </section>

        <section>
          <h2>posts</h2>
          <!-- NOTE generating these dynamically may affect SEO -->
          <ul id="posts"></ul>
          <p>
            <a href="blog/">[more posts]</a>
          </p>
        </section>
      </main>

      <footer>
        <p>color palette provided by <a href="https://rosepinetheme.com/palette/">rosé pine</a></p>
      </footer>
    </div>

    <script defer>
      fetch("blog/posts.json")
        .then(res => res.json())
        .then(posts => {
          listPosts({
            posts: posts,
            pathPrefix: "blog/",
            topN: 5
          });
        })
        .catch(err => {
          console.error("Error loading and listing posts", err);
        });
    </script>
  </body>
</html>
