<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ferments | zach churchill</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico" />
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/main.js" defer></script>
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a id="back-home" href="../index.html">~</a></li>
          <li><a id="back-one" href="../index.html" onclick="goBack()">..</a></li>
        </ul>
      </nav>
    </header>

    <section id="summary">
      <!-- TODO add fun count-up animation using JS -->
      <p>There have been <strong id="noFerments">0</strong> ferments logged overall.</p>
      <div>
        <button id="downloadData" type="button" onclick="window.open('./ferments.json')">Download ferments</button>
      </div>
    </section>

    <section>
      <h1>still cookin'</h1>
      <p id="stillCookinSummary"><strong id="noStillCookin">-</strong> still aging:</p>
      <ul id="fermentsStillCookin" class="ferments"></ul>
    </section>

    <section>
      <h1>completed</h1>
      <p><strong id="noCompleted">-</strong> completed and bottled:</p>
      <ul id="fermentsCompleted" class="ferments"></ul>
    </section>

    <footer>
      <button id="back-to-top" onclick="scrollToTop()">&uarr; <span>back to top</span></button>
    </footer>

    <script defer>
      fetch("./ferments.json")
        .then(res => res.json())
        .then(ferments => {
          document.getElementById("noFerments").innerText = ferments.length;

          const stillCookin = ferments.filter(ferment => ferment.bottlingDate === null || ferment.bottlingDate === undefined);
          if (stillCookin.length > 0) {
            document.getElementById("noStillCookin").innerText = stillCookin.length;
            listFerments({
              ferments: ferments,
              listId: "fermentsStillCookin"
            });
          } else {
            document.getElementById("stillCookinSummary").innerText = "nothin' in the pot right now.";
            document.getElementById("fermentsStillCookin").remove();
          }

          const completed = ferments.filter(ferment => ferment.bottlingDate !== null || ferment.bottlingDate !== undefined);
          document.getElementById("noCompleted").innerText = completed.length;
          listFerments({
            ferments: ferments,
            listId: "fermentsCompleted"
          });
        })
        .catch(err => {
          console.error("Error loading and displaying ferments.json", err);
          document.getElementById("noFerments").innerText = "-";
        })
    </script>
  </body>
</html>
